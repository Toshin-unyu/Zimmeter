# .github/workflows/deploy-backend.yml
# Zimmeter バックエンドの自動デプロイ（release → prod-internal VPS）
name: Deploy Backend

on:
  push:
    branches:
      - release
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:  # 手動実行

permissions:
  pull-requests: read
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_PATH: '/srv/apps/Zimmeter'
  INFRA_PATH: '/srv/toshin-infra'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Guard - PR merge のみ許可
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_COUNT=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq 'length')
          if [ "$PR_COUNT" -eq 0 ]; then
            echo "::error::直接pushによるデプロイは禁止です。main → release のPRを作成してmergeしてください。"
            exit 1
          fi
          PR_TITLE=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].title')
          echo "PR merge確認: $PR_TITLE"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.APP_PATH }} && git pull --ff-only origin release"

      - name: Run database migration
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.INFRA_PATH }} && ./scripts/control.sh prod-internal run --rm --build zimmeter-migrate"

      - name: Rebuild and restart backend
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.INFRA_PATH }} && COMPOSE_DOCKER_CLI_BUILD=1 DOCKER_BUILDKIT=1 ./scripts/control.sh prod-internal build --no-cache zimmeter-backend && ./scripts/control.sh prod-internal up -d zimmeter-backend"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 -p ${{ secrets.VPS_SSH_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker ps --filter name=zimmeter-backend --format 'table {{.Names}}\t{{.Status}}'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment summary
        run: |
          echo "## Backend Deployment Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Migration:** applied via zimmeter-migrate service" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
      - name: Slack通知 (成功)
        if: success()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${{ github.repository }} デプロイ成功\\n>ブランチ: ${{ github.ref_name }}\\n>コミット: \`${{ github.sha }}\`\\n>実行者: ${{ github.actor }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack通知 (失敗)
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"<!channel> ${{ github.repository }} デプロイ失敗\\n>ブランチ: ${{ github.ref_name }}\\n>コミット: \`${{ github.sha }}\`\\n>実行者: ${{ github.actor }}\\n>詳細: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
